<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PulseNet</title>

  <!-- PWA / home screen -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PulseNet" />
  <meta name="theme-color" content="#5b7fff" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <link rel="stylesheet" href="/style.v2.css?v=1773245493" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <div id="logo"><span class="logo-bolt">⚡</span> PulseNet</div>
        <button id="notif-btn" title="Toggle notifications" aria-label="Toggle notifications">🔔</button>
        <button id="sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">☰</button>
      </div>
      <button id="new-chat-btn">+ New Chat</button>
      <button id="burn-monitor-btn">🔥 Burn Monitor</button>
      <button id="machines-btn">🖥️ Machines</button>

      <!-- Filter Bar -->
      <div id="filter-bar">
        <div id="filter-groups"></div>
        <div id="filter-agents"></div>
        <div id="filter-count" class="hidden"></div>
      </div>

      <div id="conversation-list"></div>
      <div id="network-status"></div>
    </aside>

    <!-- Mobile overlay -->
    <div id="overlay"></div>

    <!-- Main area -->
    <main id="main">
      <!-- Empty state -->
      <div id="empty-state">
        <button class="mobile-menu-float" onclick="openSidebar()" aria-label="Open menu" style="top:50px;left:16px">☰</button>
        <div id="empty-icon">
          <svg viewBox="0 0 200 60" class="pulse-wave-hero">
            <polyline class="pulse-line-hero" points="0,30 20,30 35,30 45,8 55,52 65,18 75,42 85,30 100,30 115,30 130,8 140,52 150,18 160,42 170,30 200,30" />
          </svg>
        </div>
        <h2>PulseNet</h2>
        <p>Select a conversation or start a new chat.</p>
        <button id="empty-new-chat-btn">+ New Chat</button>
      </div>

      <!-- New Chat view -->
      <div id="new-chat-view" class="hidden">
        <div id="new-chat-header">
          <button class="mobile-menu-float" onclick="openSidebar()" aria-label="Open menu">☰</button>
          <h2>New Conversation</h2>
        </div>
        <div id="agent-selector">
          <p class="selector-hint">Select one or more agents to chat with:</p>
          <div id="agent-grid"></div>
          <div id="selected-pills"></div>
        </div>
        <div id="new-chat-compose">
          <textarea id="new-chat-input" placeholder="Type your first message…" rows="2"></textarea>
          <button id="new-chat-send-btn">Send</button>
        </div>
      </div>



      <!-- Burn Monitor view -->
      <div id="burn-view" class="hidden">
        <div id="new-chat-header">
          <button class="mobile-menu-float" onclick="openSidebar()" aria-label="Open menu">☰</button>
          <h2>Burn Monitor</h2>
        </div>
        <div id="burn-monitor-content" style="padding:14px;"></div>
      </div>
      
      <!-- Machines view -->
      <div id="machines-view" class="hidden">
        <div id="new-chat-header">
          <button class="mobile-menu-float" onclick="openSidebar()" aria-label="Open menu">☰</button>
          <h2>🖥️ Machine Resources</h2>
        </div>
        <div id="machines-content" style="padding:14px;"></div>
      </div>

      <!-- Chat view -->
      <div id="chat-view" class="hidden">
        <div id="chat-header" style="position:relative">
          <div id="chat-header-row1">
            <button id="chat-menu-btn" class="mobile-menu-float" onclick="openSidebar()" aria-label="Open menu">☰</button>
            <div id="chat-title-bar">
              <h3 id="chat-conv-title"></h3>
              <span id="chat-participant-count"></span>
            </div>
            <button id="header-toggle-btn" aria-label="Toggle participants" title="Show/hide participants">
              <svg id="header-chevron" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,7 9,12 14,7"/></svg>
            </button>
          </div>
          <div id="chat-header-row2" class="collapsed">
            <div id="chat-participants"></div>
            <button id="add-agent-btn" title="Add agent">+ Agent</button>
            <div id="add-agent-dropdown" class="hidden"></div>
          </div>
        </div>
        <div id="messages-container">
          <div id="messages"></div>
        </div>
        <div id="compose-area">
          <input type="file" id="file-input" accept="image/*,application/pdf,.doc,.docx,.txt,.csv,.json,.xlsx" multiple style="display:none">
          <div id="file-preview" class="hidden"></div>
          <div id="compose-mode-row" aria-label="Message mode">
            <button class="mode-chip active" data-mode="RUN" id="mode-run" title="Execute actions immediately">Run</button>
            <button class="mode-chip" data-mode="PLAN" id="mode-plan" title="Discuss/plan only">Plan</button>
            <button class="mode-chip" data-mode="STATUS" id="mode-status" title="Status/diagnostics only">Status</button>
            <span id="mode-indicator">RUN mode</span>
          </div>
          <div id="compose-row">
            <button id="attach-btn" aria-label="Attach file" title="Attach file"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="10" y1="4" x2="10" y2="16"/><line x1="4" y1="10" x2="16" y2="10"/></svg></button>
            <textarea id="message-input" placeholder="Message... (@ to mention agents)" rows="1" enterkeyhint="enter"></textarea>
            <button id="send-btn" aria-label="Send message">Send</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="/app.v2.js?v=1773245493"></script>
  <script src="/model-picker.js?v=1773244952"></script>

  <!-- Image Lightbox -->
  <div id="lightbox" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.92); z-index:10000; justify-content:center; align-items:center; flex-direction:column;">
    <button id="lightbox-close" style="position:absolute; top:env(safe-area-inset-top, 12px); right:12px; margin-top:12px; background:rgba(255,255,255,0.2); border:none; color:white; font-size:32px; width:48px; height:48px; border-radius:50%; cursor:pointer; z-index:10001; display:flex; align-items:center; justify-content:center; touch-action:manipulation;">&times;</button>
    <img id="lightbox-img" style="max-width:95vw; max-height:85vh; object-fit:contain; border-radius:8px;" />
    <div id="lightbox-caption" style="color:rgba(255,255,255,0.7); margin-top:12px; font-size:14px; text-align:center; padding:0 16px;"></div>
  </div>

  <script src="/dispatch-tracker.js?v=1773244952"></script>
</body>
</html>
